spring.application.name=career-os-backend

# ─── Database ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ─── JPA (Flyway owns DDL — Hibernate only validates) ───────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.validate-on-migrate=true

# ─── JWT ────────────────────────────────────────────────────────────────────
# JWT_SECRET must be a Base64-encoded string of at least 32 bytes.
# Default below is for local dev ONLY — always override in production.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
app.jwt.cookie-name=careeros_access
app.jwt.refresh-cookie-name=careeros_refresh

# ─── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ─── SpringDoc / Swagger ────────────────────────────────────────────────────
# Set SWAGGER_ENABLED=true only in dev/staging — never in production
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/api/swagger-ui
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
app.swagger.enabled=${SWAGGER_ENABLED:false}

# ─── Auth behaviour ─────────────────────────────────────────────────────────
# Set to false in local dev to skip email verification and issue JWT on register
app.auth.require-email-verification=${REQUIRE_EMAIL_VERIFICATION:true}

# ─── Cookie security ────────────────────────────────────────────────────────
# Defaults to true (safe-by-default) — auth cookies require TLS unless explicitly
# opted out via COOKIE_SECURE=false, which application-local.properties does for
# local dev over plain http://localhost. Set COOKIE_SECURE=false here only for a
# deployed environment you are certain is not TLS-terminated (rare; prefer fixing
# the TLS setup instead).
app.cookie.secure=${COOKIE_SECURE:true}

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Rate limiting ──────────────────────────────────────────────────────────
app.rate-limit.auth.capacity=10
app.rate-limit.auth.refill-tokens=10
app.rate-limit.auth.refill-duration-minutes=15

# ─── File upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.storage.upload-dir=${UPLOAD_DIR:./uploads}
app.storage.max-resumes-per-user=10

# Base URL of the frontend SPA — used to build links that must open a real
# page (email verification) rather than hit the backend's JSON API directly.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ─── Google OAuth2 (Gmail Intelligence) ─────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/email/connect/google/callback}
app.google.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ─── Token Encryption (AES-256 key, base64-encoded, 32 bytes) ────────────────
app.security.token-encryption-key=${TOKEN_ENCRYPTION_KEY}

# ─── AI Service ─────────────────────────────────────────────────────────────
app.ai.base-url=${AI_SERVICE_URL:http://localhost:8000}
app.ai.api-key=${AI_SERVICE_API_KEY:}
app.ai.timeout-seconds=30

# ─── Resilience4j — Circuit Breaker ─────────────────────────────────────────
resilience4j.circuitbreaker.instances.ai-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.ai-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ai-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.ai-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ai-service.automatic-transition-from-open-to-half-open-enabled=true

# ─── Resilience4j — Retry ────────────────────────────────────────────────────
resilience4j.retry.instances.ai-service.max-attempts=3
resilience4j.retry.instances.ai-service.wait-duration=2s
resilience4j.retry.instances.ai-service.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.io.IOException

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.careeros=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
